<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f74c00"/>
      <stop offset="100%" style="stop-color:#b7410e"/>
    </linearGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f74c00;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#f74c00;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <style>
    @keyframes drift { 0%,100% { opacity:.55; } 50% { opacity:1; } }
    .chip { animation: drift 3s ease-in-out infinite; }
  </style>

  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="url(#rust)" stroke-width="3"/>

  <!-- the viewport window: "any file, one view" -->
  <g transform="translate(54,54)">
    <rect x="0" y="0" width="124" height="98" rx="5" fill="#0d0d16" stroke="#f74c00" stroke-width="1.5"/>
    <!-- title bar -->
    <circle cx="11" cy="11" r="2.6" fill="#f74c00"/>
    <circle cx="20" cy="11" r="2.6" fill="#555"/>
    <circle cx="29" cy="11" r="2.6" fill="#555"/>
    <line x1="0" y1="20" x2="124" y2="20" stroke="#f74c00" stroke-width="0.8" opacity="0.5"/>

    <!-- format chips: text, table, image, slides -->
    <text class="chip" x="14" y="38" font-family="monospace" font-size="8" fill="#51afef">md</text>
    <text class="chip" x="40" y="38" font-family="monospace" font-size="8" fill="#4ccc66">csv</text>
    <text class="chip" x="68" y="38" font-family="monospace" font-size="8" fill="#e2b714">png</text>
    <text class="chip" x="96" y="38" font-family="monospace" font-size="8" fill="#c678dd">pptx</text>

    <!-- content lines (a previewed document) -->
    <g stroke="#cfcfd6" stroke-width="2.4" opacity="0.55" stroke-linecap="round">
      <line x1="14" y1="54" x2="74" y2="54"/>
      <line x1="14" y1="64" x2="96" y2="64"/>
      <line x1="14" y1="74" x2="60" y2="74"/>
      <line x1="14" y1="84" x2="84" y2="84"/>
    </g>
  </g>

  <!-- magnifier lens over the viewport -->
  <g transform="translate(0,2)">
    <circle cx="156" cy="128" r="26" fill="url(#lensGlow)"/>
    <circle cx="156" cy="128" r="22" fill="#0a0a14" fill-opacity="0.35" stroke="url(#rust)" stroke-width="5"/>
    <line x1="173" y1="145" x2="190" y2="162" stroke="url(#rust)" stroke-width="7" stroke-linecap="round"/>
    <!-- glint -->
    <line x1="146" y1="118" x2="152" y2="112" stroke="#ffd9c2" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <text x="128" y="204" font-family="monospace" font-size="23" font-weight="bold" fill="url(#rust)" text-anchor="middle" letter-spacing="3">viewer</text>
  <text x="128" y="222" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">universal file viewer</text>
</svg>
